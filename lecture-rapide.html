<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lecture Rapide</title>

<!-- Load editable lists. Falls back to built-in defaults if not found. -->
<script src="listes.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Cardo:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F2EBDD;
    --bg-soft: #EAE0CC;
    --paper: #FBF7EE;
    --ink: #1F1B17;
    --ink-soft: #5C544A;
    --accent: #B0432A;
    --accent-dark: #8E3320;
    --line: #C9BFA8;
    --shadow: 0 1px 0 rgba(31,27,23,.06), 0 12px 40px -12px rgba(31,27,23,.18);
    --radius: 18px;

    /* Fixed colors per digit position (units, tens, hundreds, thousands, tens of thousands) */
    --digit-0: #C8453B; /* units        — red    */
    --digit-1: #1E6FB8; /* tens         — blue   */
    --digit-2: #3D8B47; /* hundreds     — green  */
    --digit-3: #7B3F8F; /* thousands    — purple */
    --digit-4: #D67817; /* tens of thou — orange */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(176,67,42,.08), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(176,67,42,.05), transparent 60%);
    overscroll-behavior: none;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: .55;
    mix-blend-mode: multiply;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    height: 100dvh;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    padding: clamp(20px, 3vh, 40px) clamp(24px, 4vw, 56px);
    gap: clamp(12px, 2vh, 24px);
  }

  /* ---------- HEADER (time only, left) ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1;
  }
  .stat .label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .stat .value {
    font-family: 'Fraunces', serif;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    font-size: clamp(38px, 5.5vh, 56px);
    color: var(--ink);
    letter-spacing: -.02em;
  }
  .stat.warn .value { color: var(--accent); }

  /* ---------- SCORE BANNER (center, above display) ---------- */
  .score-banner {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: clamp(28px, 5vw, 64px);
    line-height: 1;
  }

  .score-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .score-block .label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .score-block .value {
    font-family: 'Fraunces', serif;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    font-size: clamp(56px, 8vh, 80px);
    color: var(--ink);
    letter-spacing: -.02em;
  }
  .score-block.muted .value {
    font-size: clamp(36px, 5vh, 50px);
    color: var(--ink-soft);
    font-style: italic;
  }

  .score-divider {
    width: 1px;
    align-self: stretch;
    background: var(--line);
    margin: 0 4px;
  }

  /* ---------- GEAR ---------- */
  .gear {
    position: absolute;
    top: clamp(20px, 3vh, 40px);
    right: clamp(24px, 4vw, 56px);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: transform .25s ease, background .2s ease;
    z-index: 10;
  }
  .gear:hover { background: var(--bg-soft); }
  .gear:active { transform: rotate(60deg) scale(.95); }
  .gear svg { width: 22px; height: 22px; }

  /* ---------- MAIN DISPLAY ---------- */
  main {
    display: grid;
    place-items: center;
    position: relative;
  }

  .display-frame {
    width: min(82vw, 760px);
    aspect-ratio: 16 / 9;
    max-height: 54vh;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
  }

  .display-frame::before,
  .display-frame::after {
    content: "";
    position: absolute;
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--line);
  }
  .display-frame::before {
    top: 14px; left: 14px;
    border-right: none; border-bottom: none;
  }
  .display-frame::after {
    bottom: 14px; right: 14px;
    border-left: none; border-top: none;
  }

  .display {
    font-family: 'Cardo', 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(140px, 26vh, 280px);
    line-height: 1;
    letter-spacing: -.005em;
    color: var(--ink);
    transition: opacity .12s ease, transform .12s ease;
    text-align: center;
    padding: 0 16px;
  }
  .display.idle {
    font-family: 'Cardo', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(48px, 8vh, 88px);
    color: var(--ink-soft);
  }
  .display.flash { opacity: 0; transform: scale(.96); }

  /* Auto-shrink for longer content */
  .display.long  { font-size: clamp(110px, 20vh, 220px); }
  .display.xlong { font-size: clamp(80px, 15vh, 170px); }

  /* ---------- FOOTER / BUTTON ---------- */
  footer {
    display: grid;
    place-items: center;
    padding-bottom: clamp(8px, 1.5vh, 16px);
  }

  .primary-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(20px, 2.6vh, 26px);
    letter-spacing: .04em;
    color: #FBF7EE;
    background: var(--ink);
    border: none;
    padding: clamp(18px, 2.8vh, 26px) clamp(64px, 12vw, 120px);
    border-radius: 999px;
    cursor: pointer;
    min-width: min(420px, 70vw);
    box-shadow: 0 1px 0 rgba(255,255,255,.1) inset, 0 6px 20px -6px rgba(31,27,23,.45);
    transition: transform .12s ease, background .2s ease, box-shadow .2s ease, opacity .2s ease;
  }
  .primary-btn:hover { background: #2C2620; }
  .primary-btn:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(255,255,255,.1) inset, 0 2px 8px -2px rgba(31,27,23,.45);
  }
  .primary-btn:disabled {
    opacity: .35;
    cursor: not-allowed;
    background: var(--ink-soft);
  }

  .primary-btn.start    { background: var(--accent); }
  .primary-btn.start:hover    { background: var(--accent-dark); }
  .primary-btn.restart  { background: var(--accent); }
  .primary-btn.restart:hover  { background: var(--accent-dark); }

  /* ---------- MODAL ---------- */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(31,27,23,.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: grid;
    place-items: center;
    z-index: 100;
    padding: 24px;
    animation: fadeIn .22s ease;
  }
  .modal[hidden] { display: none; }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }

  .modal-card {
    background: var(--paper);
    border-radius: 24px;
    padding: clamp(24px, 4vh, 40px);
    width: min(720px, 92vw);
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 30px 80px -20px rgba(31,27,23,.5);
    animation: slideUp .3s cubic-bezier(.2,.8,.2,1);
    border: 1px solid var(--line);
  }

  .modal-card h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(28px, 4vh, 36px);
    margin-bottom: 6px;
    letter-spacing: -.01em;
  }
  .modal-card .subtitle {
    color: var(--ink-soft);
    font-size: 14px;
    margin-bottom: 28px;
    font-style: italic;
    font-family: 'Fraunces', serif;
  }

  .field { margin-bottom: 28px; }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 12px;
    display: block;
  }

  /* Player segmented control */
  .seg {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    background: var(--bg);
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 14px;
  }
  .seg label {
    cursor: pointer;
    text-align: center;
    padding: 14px;
    border-radius: 10px;
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--ink-soft);
    transition: all .15s ease;
  }
  .seg input { position: absolute; opacity: 0; pointer-events: none; }
  .seg input:checked + label {
    background: var(--ink);
    color: var(--paper);
    box-shadow: 0 2px 8px -2px rgba(31,27,23,.3);
  }

  /* Time row */
  .time-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg);
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid var(--line);
  }
  .time-row input {
    font-family: 'Fraunces', serif;
    font-variant-numeric: tabular-nums;
    font-size: 24px;
    font-weight: 500;
    background: transparent;
    border: none;
    color: var(--ink);
    width: 80px;
    text-align: right;
    outline: none;
  }
  .time-row .unit { color: var(--ink-soft); font-size: 14px; }
  .time-row .stepper { margin-left: auto; display: flex; gap: 8px; }
  .step-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--paper);
    cursor: pointer;
    font-size: 18px;
    color: var(--ink);
    transition: background .15s ease;
  }
  .step-btn:hover { background: var(--bg-soft); }
  .step-btn:active { transform: scale(.94); }

  /* Game grid */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .game-grid label {
    position: relative;
    cursor: pointer;
  }
  .game-grid input { position: absolute; opacity: 0; pointer-events: none; }
  .game-grid .pill {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 10px;
    background: var(--bg);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink-soft);
    text-align: center;
    transition: all .15s ease;
    min-height: 60px;
  }
  .game-grid input:checked + .pill {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .game-grid label:active .pill { transform: scale(.96); }

  .modal-actions {
    margin-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .modal-actions .primary-btn {
    min-width: 160px;
    padding: 16px 40px;
    font-size: 18px;
  }

  .reset-btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    background: transparent;
    border: 1px solid var(--line);
    padding: 12px 20px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .2s ease;
    letter-spacing: .02em;
  }
  .reset-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  .reset-btn.armed {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(176,67,42,.5); }
    50%      { box-shadow: 0 0 0 8px rgba(176,67,42,0); }
  }
  .reset-btn.done {
    background: transparent;
    color: var(--ink-soft);
    border-color: var(--line);
    animation: none;
  }

  /* ---------- CELEBRATION OVERLAY ---------- */
  .celebration {
    position: fixed;
    inset: 0;
    background: rgba(31,27,23,.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: grid;
    place-items: center;
    z-index: 200;
    cursor: pointer;
    overflow: hidden;
  }
  .celebration[hidden] { display: none; }

  .celebration-card {
    text-align: center;
    color: var(--paper);
    animation: popIn .5s cubic-bezier(.18,1.4,.4,1);
    position: relative;
    z-index: 2;
  }
  .celebration-card .bravo {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(80px, 16vh, 160px);
    letter-spacing: -.02em;
    background: linear-gradient(135deg, #FFD56A 0%, #FF8B3D 50%, #E8417C 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 12px;
    text-shadow: 0 4px 20px rgba(255,140,60,.4);
  }
  .celebration-card .sub {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(24px, 4vh, 38px);
    color: var(--paper);
    margin-bottom: 24px;
    font-style: italic;
  }
  .celebration-card .new-score {
    font-family: 'Fraunces', serif;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    font-size: clamp(64px, 10vh, 100px);
    color: #FFD56A;
    line-height: 1;
  }
  .celebration-card .new-score-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(251,247,238,.7);
    margin-top: 12px;
  }
  .celebration-hint {
    position: absolute;
    bottom: 32px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(251,247,238,.6);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    letter-spacing: .1em;
    z-index: 2;
  }

  @keyframes popIn {
    0%   { transform: scale(.3) rotate(-8deg); opacity: 0; }
    60%  { transform: scale(1.08) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* Confetti */
  .confetti {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    top: -20px;
    width: 12px;
    height: 14px;
    opacity: 0;
    animation: confettiFall 3.5s ease-in forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 1; }
  }
  .confetti-piece.round { border-radius: 50%; width: 10px; height: 10px; }
  .confetti-piece.star {
    width: 24px; height: 24px;
    background: transparent !important;
    font-size: 22px;
    text-align: center;
    line-height: 1;
  }

  /* tablets in portrait */
  @media (max-width: 820px) and (orientation: portrait) {
    .display-frame { aspect-ratio: 4/3; }
  }
  @media (max-height: 500px) {
    .display { font-size: clamp(80px, 22vh, 160px); }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="stat" id="timeStat">
      <span class="label">Temps</span>
      <span class="value" id="time">01:00</span>
    </div>
  </header>

  <div class="score-banner">
    <div class="score-block">
      <span class="label">Score</span>
      <span class="value" id="counter">0</span>
    </div>
    <div class="score-divider"></div>
    <div class="score-block muted">
      <span class="label">Record · <span id="playerLabel">Joueur 1</span></span>
      <span class="value" id="highScore">0</span>
    </div>
  </div>

  <button class="gear" id="gearBtn" aria-label="Configuration">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <main>
    <div class="display-frame">
      <div class="display idle" id="display">prêt&nbsp;?</div>
    </div>
  </main>

  <footer>
    <button class="primary-btn start" id="mainBtn">Commencer</button>
  </footer>
</div>

<!-- Configuration Modal -->
<div class="modal" id="modal" hidden>
  <div class="modal-card">
    <h2>Configuration</h2>
    <p class="subtitle">Joueur, durée et type de jeu</p>

    <div class="field">
      <label class="field-label">Joueur</label>
      <div class="seg" id="playerSeg">
        <input type="radio" name="player" value="p1" id="p1" checked>
        <label for="p1">Joueur 1</label>
        <input type="radio" name="player" value="p2" id="p2">
        <label for="p2">Joueur 2</label>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Durée du chronomètre</label>
      <div class="time-row">
        <input type="number" id="timeInput" min="5" max="3600" step="5">
        <span class="unit">secondes</span>
        <div class="stepper">
          <button class="step-btn" id="timeMinus" aria-label="moins 5">−</button>
          <button class="step-btn" id="timePlus" aria-label="plus 5">+</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Type de jeu</label>
      <div class="game-grid" id="gameGrid"></div>
    </div>

    <div class="modal-actions">
      <button class="reset-btn" id="resetBtn" type="button">Réinitialiser les records</button>
      <button class="primary-btn" id="modalOk">OK</button>
    </div>
  </div>
</div>

<!-- Celebration overlay -->
<div class="celebration" id="celebration" hidden>
  <div class="confetti" id="confetti"></div>
  <div class="celebration-card">
    <div class="bravo">Bravo&nbsp;!</div>
    <div class="sub">Nouveau record</div>
    <div class="new-score" id="celebScore">0</div>
    <div class="new-score-label">points</div>
  </div>
  <div class="celebration-hint">touche pour continuer</div>
</div>

<script>
  /* ============================================================
     Lists come from listes.js. If that file fails to load, we
     fall back to minimal built-in defaults so the app still runs.
     ============================================================ */
  const FALLBACK_LISTES = {
    voyelles: ["a","e","é","è","ê","i","o","u","ou"],
    consonnes: ["b","c","d","f","g","j","l","m","n","p","r","s","t","v","z","ch","br","cr","tr"],
    mots: ["chat","chien","maison","école","papa","maman","livre","ami"]
  };
  const LISTES = (window.LISTES && window.LISTES.voyelles) ? window.LISTES : FALLBACK_LISTES;

  /* All available games. Add/remove/rename here. */
  const GAMES = [
    { id: 'cv',     label: 'cv',         numeric: false },
    { id: 'vc',     label: 'vc',         numeric: false },
    { id: 'cvvc',   label: 'cv ou vc',   numeric: false },
    { id: 'cvc',    label: 'cvc',        numeric: false },
    { id: 'mots',   label: 'mots',       numeric: false },
    { id: 'diz',    label: 'dizaines',   numeric: true, min: 10,    max: 99    },
    { id: 'cent',   label: 'centaines',  numeric: true, min: 100,   max: 999   },
    { id: 'mil',    label: 'milliers',   numeric: true, min: 1000,  max: 9999  },
    { id: 'dmil',   label: 'dizaines de milliers', numeric: true, min: 10000, max: 99999 }
  ];

  const DEFAULT_DURATION = 60;

  /* ---- State ---- */
  let duration       = DEFAULT_DURATION;
  let currentGame    = 'cv';
  let currentPlayer  = 'p1';
  let timeLeft       = duration;
  let counter        = 0;
  let timerId        = null;
  let lastContent    = null;
  let phase          = 'idle'; // idle | running | finished

  /* ---- DOM ---- */
  const $ = id => document.getElementById(id);
  const displayEl    = $('display');
  const mainBtn      = $('mainBtn');
  const counterEl    = $('counter');
  const highScoreEl  = $('highScore');
  const playerLabelEl= $('playerLabel');
  const timeEl       = $('time');
  const timeStat     = $('timeStat');
  const gearBtn      = $('gearBtn');
  const modal        = $('modal');
  const timeInput    = $('timeInput');
  const modalOk      = $('modalOk');
  const timeMinus    = $('timeMinus');
  const timePlus     = $('timePlus');
  const gameGrid     = $('gameGrid');
  const resetBtn     = $('resetBtn');
  const celebration  = $('celebration');
  const confettiEl   = $('confetti');
  const celebScoreEl = $('celebScore');

  /* ---- localStorage helpers ---- */
  const LS = {
    get: (k, d) => { try { const v = localStorage.getItem(k); return v === null ? d : v; } catch(e){ return d; } },
    set: (k, v) => { try { localStorage.setItem(k, v); } catch(e){} }
  };

  function loadConfig() {
    const d = parseInt(LS.get('lr_duration', String(DEFAULT_DURATION)), 10);
    if (!isNaN(d) && d >= 5) duration = d;
    const g = LS.get('lr_game', 'cv');
    if (GAMES.some(x => x.id === g)) currentGame = g;
    const p = LS.get('lr_player', 'p1');
    if (p === 'p1' || p === 'p2') currentPlayer = p;
  }
  function saveConfig() {
    LS.set('lr_duration', String(duration));
    LS.set('lr_game', currentGame);
    LS.set('lr_player', currentPlayer);
  }

  function highScoreKey(player, game) { return `lr_hs_${player}_${game}`; }
  function getHighScore(player = currentPlayer, game = currentGame) {
    return parseInt(LS.get(highScoreKey(player, game), '0'), 10) || 0;
  }
  function setHighScore(score) { LS.set(highScoreKey(currentPlayer, currentGame), String(score)); }

  /* ---- Formatting helpers ---- */
  function fmt(s) {
    s = Math.max(0, s);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  function refreshTime() {
    timeEl.textContent = fmt(timeLeft);
    timeStat.classList.toggle('warn', phase === 'running' && timeLeft <= 10);
  }
  function refreshHighScore() {
    highScoreEl.textContent = getHighScore();
    playerLabelEl.textContent = currentPlayer === 'p1' ? 'Joueur 1' : 'Joueur 2';
  }

  /* ---- Content generation ---- */
  function rand(arr)        { return arr[Math.floor(Math.random() * arr.length)]; }
  function randInt(min,max) { return min + Math.floor(Math.random() * (max - min + 1)); }

  function generateContent() {
    const v = LISTES.voyelles, c = LISTES.consonnes, m = LISTES.mots;
    switch (currentGame) {
      case 'cv':   return { text: rand(c) + rand(v), numeric: false };
      case 'vc':   return { text: rand(v) + rand(c), numeric: false };
      case 'cvvc': return Math.random() < 0.5
                     ? { text: rand(c) + rand(v), numeric: false }
                     : { text: rand(v) + rand(c), numeric: false };
      case 'cvc':  return { text: rand(c) + rand(v) + rand(c), numeric: false };
      case 'mots': return { text: rand(m), numeric: false };
      default: {
        const g = GAMES.find(x => x.id === currentGame);
        return { text: String(randInt(g.min, g.max)), numeric: true };
      }
    }
  }

  /* Colored digits — fixed color per position from the right */
  function colorizeNumber(numStr) {
    const len = numStr.length;
    return numStr.split('').map((d, i) => {
      const pos = len - 1 - i;          // 0=units, 1=tens, 2=hundreds, ...
      const cssVar = `var(--digit-${Math.min(pos, 4)})`;
      return `<span style="color:${cssVar}">${d}</span>`;
    }).join('');
  }

  function showContent() {
    let next, attempts = 0;
    do {
      next = generateContent();
      attempts++;
    } while (next.text === lastContent && attempts < 5);
    lastContent = next.text;

    displayEl.classList.add('flash');
    setTimeout(() => {
      displayEl.classList.remove('idle');
      // Auto-shrink for long fragments
      const len = next.text.length;
      displayEl.classList.toggle('xlong', len > 6);
      displayEl.classList.toggle('long',  len > 4 && len <= 6);
      if (next.numeric) {
        displayEl.innerHTML = colorizeNumber(next.text);
      } else {
        displayEl.textContent = next.text;
      }
      displayEl.classList.remove('flash');
    }, 80);
  }

  function showIdleText(text) {
    displayEl.classList.add('flash');
    setTimeout(() => {
      displayEl.classList.add('idle');
      displayEl.classList.remove('long','xlong');
      displayEl.innerHTML = text;
      displayEl.classList.remove('flash');
    }, 80);
  }

  /* ---- Game flow ---- */
  function startGame() {
    counter = 0;
    counterEl.textContent = counter;
    timeLeft = duration;
    refreshTime();
    phase = 'running';
    mainBtn.textContent = 'OK';
    mainBtn.classList.remove('start', 'restart');
    lastContent = null;
    showContent();

    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
      timeLeft--;
      refreshTime();
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  function endGame() {
    clearInterval(timerId);
    timerId = null;
    phase = 'finished';
    mainBtn.textContent = 'Recommencer';
    mainBtn.classList.add('restart');
    showIdleText('terminé&nbsp;!');
    timeStat.classList.remove('warn');

    // Disable button for 2 seconds to prevent accidental restart
    mainBtn.disabled = true;
    setTimeout(() => { mainBtn.disabled = false; }, 2000);

    // High score check
    const prev = getHighScore();
    if (counter > prev) {
      setHighScore(counter);
      refreshHighScore();
      triggerCelebration(counter);
    }
  }

  function nextWord() {
    counter++;
    counterEl.textContent = counter;
    showContent();
  }

  mainBtn.addEventListener('click', () => {
    if (mainBtn.disabled) return;
    if (phase === 'idle' || phase === 'finished') startGame();
    else if (phase === 'running') nextWord();
  });

  /* ---- Celebration ---- */
  const CONFETTI_COLORS = ['#FFD56A','#FF8B3D','#E8417C','#6FCFAF','#5BAEE8','#B58CE3','#FFE38A'];
  const STARS = ['⭐','🌟','✨','🎉','🎊'];

  function triggerCelebration(score) {
    celebScoreEl.textContent = score;
    confettiEl.innerHTML = '';

    // 50 falling confetti pieces (mix of squares, circles, stars)
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      const r = Math.random();
      if (r < 0.2) {
        p.classList.add('star');
        p.textContent = STARS[Math.floor(Math.random() * STARS.length)];
      } else {
        if (r < 0.5) p.classList.add('round');
        p.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      }
      p.style.left = (Math.random() * 100) + '%';
      p.style.animationDelay = (Math.random() * 1.2) + 's';
      p.style.animationDuration = (2.6 + Math.random() * 1.6) + 's';
      confettiEl.appendChild(p);
    }
    celebration.hidden = false;

    // Auto-dismiss after 4.5s
    clearTimeout(triggerCelebration._t);
    triggerCelebration._t = setTimeout(closeCelebration, 4500);
  }
  function closeCelebration() { celebration.hidden = true; }
  celebration.addEventListener('click', closeCelebration);

  /* ---- Configuration modal ---- */
  function buildGameGrid() {
    gameGrid.innerHTML = '';
    GAMES.forEach(g => {
      const label = document.createElement('label');
      const input = document.createElement('input');
      input.type = 'radio';
      input.name = 'game';
      input.value = g.id;
      input.checked = (g.id === currentGame);
      const pill = document.createElement('span');
      pill.className = 'pill';
      pill.textContent = g.label;
      label.appendChild(input);
      label.appendChild(pill);
      gameGrid.appendChild(label);
    });
  }

  function openModal() {
    buildGameGrid();
    timeInput.value = duration;
    document.querySelector(`input[name="player"][value="${currentPlayer}"]`).checked = true;
    disarmResetBtn();
    modal.hidden = false;
  }
  function closeModal() { modal.hidden = true; }

  gearBtn.addEventListener('click', openModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

  timeMinus.addEventListener('click', () => {
    timeInput.value = Math.max(5, (parseInt(timeInput.value, 10) || 0) - 5);
  });
  timePlus.addEventListener('click', () => {
    timeInput.value = Math.min(3600, (parseInt(timeInput.value, 10) || 0) + 5);
  });

  modalOk.addEventListener('click', () => {
    // Player
    const p = document.querySelector('input[name="player"]:checked');
    if (p) currentPlayer = p.value;

    // Duration
    const newDur = parseInt(timeInput.value, 10);
    if (!isNaN(newDur) && newDur >= 5) {
      duration = newDur;
      if (phase === 'idle' || phase === 'finished') {
        timeLeft = duration;
        refreshTime();
      }
    }

    // Game
    const g = document.querySelector('input[name="game"]:checked');
    if (g) currentGame = g.value;

    saveConfig();
    refreshHighScore();
    closeModal();
  });

  /* ---- Reset high scores (two-step confirmation) ---- */
  let resetArmedTimer = null;

  function disarmResetBtn() {
    clearTimeout(resetArmedTimer);
    resetBtn.classList.remove('armed', 'done');
    resetBtn.textContent = 'Réinitialiser les records';
    resetBtn.dataset.armed = 'false';
  }

  function clearAllHighScores() {
    GAMES.forEach(g => {
      ['p1', 'p2'].forEach(p => {
        try { localStorage.removeItem(highScoreKey(p, g.id)); } catch(e) {}
      });
    });
  }

  resetBtn.addEventListener('click', () => {
    if (resetBtn.dataset.armed === 'true') {
      // Second click — confirm
      clearAllHighScores();
      refreshHighScore();
      clearTimeout(resetArmedTimer);
      resetBtn.classList.remove('armed');
      resetBtn.classList.add('done');
      resetBtn.textContent = '✓ Records effacés';
      resetBtn.dataset.armed = 'false';
      setTimeout(disarmResetBtn, 1800);
    } else {
      // First click — arm
      resetBtn.dataset.armed = 'true';
      resetBtn.classList.add('armed');
      resetBtn.textContent = 'Confirmer la suppression ?';
      clearTimeout(resetArmedTimer);
      // Auto-disarm after 4 seconds if no confirmation
      resetArmedTimer = setTimeout(disarmResetBtn, 4000);
    }
  });

  /* ---- Init ---- */
  loadConfig();
  refreshTime();
  refreshHighScore();
</script>
</body>
</html>
