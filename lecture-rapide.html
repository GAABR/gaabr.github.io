<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lecture Rapide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2EBDD;
    --bg-soft: #EAE0CC;
    --paper: #FBF7EE;
    --ink: #1F1B17;
    --ink-soft: #5C544A;
    --accent: #B0432A;
    --accent-dark: #8E3320;
    --line: #C9BFA8;
    --shadow: 0 1px 0 rgba(31,27,23,.06), 0 12px 40px -12px rgba(31,27,23,.18);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(176,67,42,.08), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(176,67,42,.05), transparent 60%);
    overscroll-behavior: none;
  }

  /* subtle paper grain */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: .55;
    mix-blend-mode: multiply;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    height: 100dvh;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    padding: clamp(20px, 3vh, 40px) clamp(24px, 4vw, 56px);
    gap: clamp(12px, 2vh, 24px);
  }

  /* ---------- HEADER ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .stats {
    display: flex;
    gap: clamp(28px, 5vw, 64px);
    align-items: baseline;
  }

  .stats.right { justify-content: flex-end; }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1;
  }
  .stats.right .stat { align-items: flex-end; }

  .stat .label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .stat .value {
    font-family: 'Fraunces', serif;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    font-size: clamp(38px, 5.5vh, 56px);
    color: var(--ink);
    letter-spacing: -.02em;
  }

  .stat.warn .value { color: var(--accent); }

  /* ---------- SCORE BANNER (centered above display) ---------- */
  .score-banner {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    gap: 10px;
  }

  .score-banner .label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .score-banner .value {
    font-family: 'Fraunces', serif;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    font-size: clamp(56px, 8vh, 80px);
    color: var(--ink);
    letter-spacing: -.02em;
  }

  .gear {
    position: absolute;
    top: clamp(20px, 3vh, 40px);
    right: clamp(24px, 4vw, 56px);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: transform .25s ease, background .2s ease;
    z-index: 10;
  }
  .gear:hover { background: var(--bg-soft); }
  .gear:active { transform: rotate(60deg) scale(.95); }
  .gear svg { width: 22px; height: 22px; }

  /* ---------- MAIN DISPLAY ---------- */
  main {
    display: grid;
    place-items: center;
    position: relative;
  }

  .display-frame {
    width: min(82vw, 760px);
    aspect-ratio: 16 / 9;
    max-height: 54vh;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
  }

  /* corner ornaments */
  .display-frame::before,
  .display-frame::after {
    content: "";
    position: absolute;
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--line);
  }
  .display-frame::before {
    top: 14px; left: 14px;
    border-right: none; border-bottom: none;
  }
  .display-frame::after {
    bottom: 14px; right: 14px;
    border-left: none; border-top: none;
  }

  .display {
    font-family: 'Newsreader', 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(140px, 26vh, 280px);
    line-height: 1;
    letter-spacing: -.005em;
    color: var(--ink);
    transition: opacity .12s ease, transform .12s ease;
  }

  .display.idle {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(48px, 8vh, 88px);
    color: var(--ink-soft);
  }

  .display.flash {
    opacity: 0;
    transform: scale(.96);
  }

  /* ---------- FOOTER / BUTTON ---------- */
  footer {
    display: grid;
    place-items: center;
    padding-bottom: clamp(8px, 1.5vh, 16px);
  }

  .primary-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(20px, 2.6vh, 26px);
    letter-spacing: .04em;
    color: #FBF7EE;
    background: var(--ink);
    border: none;
    padding: clamp(18px, 2.8vh, 26px) clamp(64px, 12vw, 120px);
    border-radius: 999px;
    cursor: pointer;
    min-width: min(420px, 70vw);
    box-shadow: 0 1px 0 rgba(255,255,255,.1) inset, 0 6px 20px -6px rgba(31,27,23,.45);
    transition: transform .12s ease, background .2s ease, box-shadow .2s ease;
  }
  .primary-btn:hover { background: #2C2620; }
  .primary-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(255,255,255,.1) inset, 0 2px 8px -2px rgba(31,27,23,.45);
  }

  .primary-btn.start { background: var(--accent); }
  .primary-btn.start:hover { background: var(--accent-dark); }

  .primary-btn.restart { background: var(--accent); }
  .primary-btn.restart:hover { background: var(--accent-dark); }

  /* ---------- MODAL ---------- */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(31,27,23,.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: grid;
    place-items: center;
    z-index: 100;
    padding: 24px;
    animation: fadeIn .22s ease;
  }
  .modal[hidden] { display: none; }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }

  .modal-card {
    background: var(--paper);
    border-radius: 24px;
    padding: clamp(24px, 4vh, 40px);
    width: min(720px, 92vw);
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 30px 80px -20px rgba(31,27,23,.5);
    animation: slideUp .3s cubic-bezier(.2,.8,.2,1);
    border: 1px solid var(--line);
  }

  .modal-card h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(28px, 4vh, 36px);
    margin-bottom: 6px;
    letter-spacing: -.01em;
  }
  .modal-card .subtitle {
    color: var(--ink-soft);
    font-size: 14px;
    margin-bottom: 28px;
    font-style: italic;
    font-family: 'Fraunces', serif;
  }

  .field { margin-bottom: 28px; }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 12px;
    display: block;
  }

  .time-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg);
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid var(--line);
  }
  .time-row input {
    font-family: 'Fraunces', serif;
    font-variant-numeric: tabular-nums;
    font-size: 24px;
    font-weight: 500;
    background: transparent;
    border: none;
    color: var(--ink);
    width: 80px;
    text-align: right;
    outline: none;
  }
  .time-row .unit { color: var(--ink-soft); font-size: 14px; }
  .time-row .stepper {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  .step-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--paper);
    cursor: pointer;
    font-size: 18px;
    color: var(--ink);
    transition: background .15s ease;
  }
  .step-btn:hover { background: var(--bg-soft); }
  .step-btn:active { transform: scale(.94); }

  .grid-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .small-btn {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all .15s ease;
  }
  .small-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .checkbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 10px;
  }

  .cb {
    position: relative;
    cursor: pointer;
  }
  .cb input { position: absolute; opacity: 0; pointer-events: none; }
  .cb .pill {
    display: grid;
    place-items: center;
    padding: 14px 8px;
    background: var(--bg);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--ink-soft);
    transition: all .15s ease;
    min-height: 60px;
  }
  .cb input:checked + .pill {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .cb:active .pill { transform: scale(.96); }

  .modal-actions {
    margin-top: 32px;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }

  .modal-actions .primary-btn {
    min-width: 160px;
    padding: 16px 40px;
    font-size: 18px;
  }

  /* tablets in portrait + smaller */
  @media (max-width: 820px) and (orientation: portrait) {
    .display-frame { aspect-ratio: 4/3; }
  }

  /* prevent landscape overflow on small screens */
  @media (max-height: 500px) {
    .display { font-size: clamp(80px, 22vh, 160px); }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="stat" id="timeStat">
      <span class="label">Temps</span>
      <span class="value" id="time">01:00</span>
    </div>
  </header>

  <div class="score-banner">
    <span class="label">Score</span>
    <span class="value" id="counter">0</span>
  </div>

  <button class="gear" id="gearBtn" aria-label="Configuration">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <main>
    <div class="display-frame">
      <div class="display idle" id="display">prêt&nbsp;?</div>
    </div>
  </main>

  <footer>
    <button class="primary-btn start" id="mainBtn">Commencer</button>
  </footer>
</div>

<!-- Configuration Modal -->
<div class="modal" id="modal" hidden>
  <div class="modal-card">
    <h2>Configuration</h2>
    <p class="subtitle">Ajuster la durée et choisir les syllabes</p>

    <div class="field">
      <label class="field-label">Durée du chronomètre</label>
      <div class="time-row">
        <input type="number" id="timeInput" min="5" max="3600" step="5">
        <span class="unit">secondes</span>
        <div class="stepper">
          <button class="step-btn" id="timeMinus" aria-label="moins 5">−</button>
          <button class="step-btn" id="timePlus" aria-label="plus 5">+</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Syllabes incluses</label>
      <div class="grid-controls">
        <button class="small-btn" id="selectAll">Tout sélectionner</button>
        <button class="small-btn" id="selectNone">Tout désélectionner</button>
      </div>
      <div class="checkbox-grid" id="checkboxGrid"></div>
    </div>

    <div class="modal-actions">
      <button class="primary-btn" id="modalOk">OK</button>
    </div>
  </div>
</div>

<script>
  /* ============================================================
     ═══ MODIFY YOUR LIST HERE ═══
     Add or remove syllables freely. The configuration menu
     adjusts to whatever is in this array.
     ============================================================ */
  const WORD_LIST = [
    "sa", "se", "sé", "sè", "sê", "si", "so", "su",
    "ja", "je", "jé", "jè", "jê", "ji", "jo", "ju",
    "va", "ve", "vé", "vè", "vê", "vi", "vo", "vu",
    "la", "le", "lé", "lè", "lê", "li", "lo", "lu",
    "ra", "re", "ré", "rè", "rê", "ri", "ro", "ru",
    "fa", "fe", "fé", "fè", "fê", "fi", "fo", "fu",
    "il"
  ];

  /* Default timer duration in seconds */
  const DEFAULT_DURATION = 60;
  /* ============================================================ */

  // ---- State ----
  let duration = DEFAULT_DURATION;
  let timeLeft = duration;
  let counter = 0;
  let included = new Set(WORD_LIST);
  let timerId = null;
  let lastWord = null;
  let phase = 'idle'; // idle | running | finished

  // ---- DOM ----
  const $ = id => document.getElementById(id);
  const displayEl = $('display');
  const mainBtn = $('mainBtn');
  const counterEl = $('counter');
  const timeEl = $('time');
  const timeStat = $('timeStat');
  const gearBtn = $('gearBtn');
  const modal = $('modal');
  const checkboxGrid = $('checkboxGrid');
  const timeInput = $('timeInput');
  const modalOk = $('modalOk');
  const timeMinus = $('timeMinus');
  const timePlus = $('timePlus');
  const selectAll = $('selectAll');
  const selectNone = $('selectNone');

  // ---- Helpers ----
  function fmt(s) {
    s = Math.max(0, s);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function refreshTime() {
    timeEl.textContent = fmt(timeLeft);
    timeStat.classList.toggle('warn', phase === 'running' && timeLeft <= 10);
  }

  function pickRandom() {
    const pool = WORD_LIST.filter(w => included.has(w));
    if (pool.length === 0) return '—';
    if (pool.length === 1) return pool[0];
    let pick;
    do {
      pick = pool[Math.floor(Math.random() * pool.length)];
    } while (pick === lastWord);
    lastWord = pick;
    return pick;
  }

  function showWord(w) {
    displayEl.classList.add('flash');
    setTimeout(() => {
      displayEl.classList.remove('idle');
      displayEl.textContent = w;
      displayEl.classList.remove('flash');
    }, 80);
  }

  function showIdleText(text) {
    displayEl.classList.add('flash');
    setTimeout(() => {
      displayEl.classList.add('idle');
      displayEl.innerHTML = text;
      displayEl.classList.remove('flash');
    }, 80);
  }

  // ---- Game logic ----
  function startGame() {
    counter = 0;
    counterEl.textContent = counter;
    timeLeft = duration;
    refreshTime();
    phase = 'running';
    mainBtn.textContent = 'OK';
    mainBtn.classList.remove('start', 'restart');
    lastWord = null;
    showWord(pickRandom());

    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
      timeLeft--;
      refreshTime();
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  function endGame() {
    clearInterval(timerId);
    timerId = null;
    phase = 'finished';
    mainBtn.textContent = 'Recommencer';
    mainBtn.classList.add('restart');
    showIdleText('terminé&nbsp;!');
    timeStat.classList.remove('warn');
  }

  function nextWord() {
    counter++;
    counterEl.textContent = counter;
    showWord(pickRandom());
  }

  mainBtn.addEventListener('click', () => {
    if (phase === 'idle' || phase === 'finished') startGame();
    else if (phase === 'running') nextWord();
  });

  // ---- Configuration modal ----
  function buildCheckboxes() {
    checkboxGrid.innerHTML = '';
    WORD_LIST.forEach(word => {
      const label = document.createElement('label');
      label.className = 'cb';
      const input = document.createElement('input');
      input.type = 'checkbox';
      input.checked = included.has(word);
      input.dataset.word = word;
      const pill = document.createElement('span');
      pill.className = 'pill';
      pill.textContent = word;
      label.appendChild(input);
      label.appendChild(pill);
      checkboxGrid.appendChild(label);
    });
  }

  function openModal() {
    buildCheckboxes();
    timeInput.value = duration;
    modal.hidden = false;
  }

  function closeModal() {
    modal.hidden = true;
  }

  gearBtn.addEventListener('click', openModal);

  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  selectAll.addEventListener('click', () => {
    checkboxGrid.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
  });
  selectNone.addEventListener('click', () => {
    checkboxGrid.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
  });

  timeMinus.addEventListener('click', () => {
    const v = Math.max(5, (parseInt(timeInput.value, 10) || 0) - 5);
    timeInput.value = v;
  });
  timePlus.addEventListener('click', () => {
    const v = Math.min(3600, (parseInt(timeInput.value, 10) || 0) + 5);
    timeInput.value = v;
  });

  modalOk.addEventListener('click', () => {
    // Apply syllable selection
    const newIncluded = new Set();
    checkboxGrid.querySelectorAll('input[type=checkbox]').forEach(cb => {
      if (cb.checked) newIncluded.add(cb.dataset.word);
    });
    if (newIncluded.size > 0) included = newIncluded;
    // (If user unchecked everything we silently keep previous selection.)

    // Apply duration
    let newDuration = parseInt(timeInput.value, 10);
    if (!isNaN(newDuration) && newDuration >= 5) {
      duration = newDuration;
      // If a game is not running, reflect new duration in the display
      if (phase === 'idle' || phase === 'finished') {
        timeLeft = duration;
        refreshTime();
      }
    }
    closeModal();
  });

  // ---- Init ----
  refreshTime();
</script>
</body>
</html>
